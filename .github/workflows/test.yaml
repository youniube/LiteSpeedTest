name: Build Windows

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (windows, amd64, lite-windows-amd64)
    runs-on: windows-latest

    env:
      GOOS: windows
      GOARCH: amd64
      CGO_ENABLED: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.14"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show workflow information
        id: get_filename
        shell: pwsh
        run: |
          $assetName = "lite-windows-amd64"
          echo "ASSET_NAME=$assetName" >> $env:GITHUB_ENV
          echo "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          go version
          node -v
          npm -v
          Copy-Item "$(go env GOROOT)\misc\wasm\wasm_exec.js" ".\web\gui\wasm_exec.js" -Force
          npm install --prefix web/gui
          $env:NODE_ENV="production"
          npm run --prefix web/gui build

      - name: Resolve Go modules
        shell: pwsh
        run: |
          go mod download
          go mod tidy

      - name: Build wasm
        shell: pwsh
        run: |
          $env:GOOS="js"
          $env:GOARCH="wasm"
          go build -o .\web\gui\dist\main.wasm .\wasm

      - name: Build binary
        shell: pwsh
        run: |
          $env:GOOS="windows"
          $env:GOARCH="amd64"
          $env:CGO_ENABLED="0"
          go build -v -o lite.exe .

      - name: Smoke check
        shell: pwsh
        run: |
          Get-ChildItem lite.exe
          .\lite.exe -v

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path lite.exe -DestinationPath "lite-$env:ASSET_NAME.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_filename.outputs.asset_name }}.zip
          path: lite-${{ steps.get_filename.outputs.asset_name }}.zip
          if-no-files-found: error
