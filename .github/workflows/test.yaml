name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (linux, amd64, lite-linux-amd64)
    runs-on: ubuntu-latest

    env:
      GOOS: linux
      GOARCH: amd64
      CGO_ENABLED: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.14"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Show workflow information
        id: get_filename
        shell: bash
        run: |
          ASSET_NAME="lite-linux-amd64"

          if [ -f release/friendly-filenames.json ]; then
            NAME_FROM_JSON=$(jq -r '."linux-amd64".friendlyName // empty' release/friendly-filenames.json)
            if [ -n "$NAME_FROM_JSON" ] && [ "$NAME_FROM_JSON" != "null" ]; then
              ASSET_NAME="$NAME_FROM_JSON"
            fi
          fi

          echo "GOOS=$GOOS GOARCH=$GOARCH ASSET_NAME=$ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        shell: bash
        run: |
          go version
          node -v
          npm -v
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" ./web/gui/wasm_exec.js
          npm install --prefix web/gui
          NODE_ENV=production npm run --prefix web/gui build

      - name: Resolve Go modules
        shell: bash
        run: |
          go mod download
          go mod tidy

      - name: Build wasm
        shell: bash
        run: |
          GOOS=js GOARCH=wasm go build -o ./web/gui/dist/main.wasm ./wasm

      - name: Build binary
        shell: bash
        run: |
          go build -v -o lite .

      - name: Smoke check
        shell: bash
        run: |
          ls -lah lite
          file lite || true

      - name: Create ZIP archive
        shell: bash
        run: |
          zip -9vr "lite-${ASSET_NAME}.zip" lite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lite-${{ steps.get_filename.outputs.asset_name }}.zip
          path: lite-${{ steps.get_filename.outputs.asset_name }}.zip
          if-no-files-found: error
