name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release
    runs-on: ubuntu-latest

    env:
      CGO_ENABLED: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.14"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          go version
          node -v
          npm -v

      - name: Prepare frontend
        run: |
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" ./web/gui/wasm_exec.js
          npm install --prefix web/gui
          NODE_ENV=production npm run --prefix web/gui build

      - name: Resolve Go modules
        run: |
          go mod download
          go mod tidy

      - name: Build wasm
        run: |
          GOOS=js GOARCH=wasm go build -o ./web/gui/dist/main.wasm ./wasm

      - name: Build releases
        env:
          NAME: lite
          BINDIR: bin
        run: |
          make -j releases

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          draft: true
