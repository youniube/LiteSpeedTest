name: Cron Test

on:
  workflow_dispatch:
  schedule:
    - cron: "40 20 */2 * *"

permissions:
  contents: read

jobs:
  build_and_test:
    name: LiteSpeedTest
    runs-on: ubuntu-latest

    env:
      CGO_ENABLED: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.14"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          go version
          node -v
          npm -v
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" ./web/gui/wasm_exec.js
          npm install --prefix web/gui
          NODE_ENV=production npm run --prefix web/gui build

      - name: Resolve Go modules
        run: |
          go mod download
          go mod tidy

      - name: Build wasm
        run: |
          GOOS=js GOARCH=wasm go build -o ./web/gui/dist/main.wasm ./wasm

      - name: Run build
        run: |
          go build -o lite .

      - name: Test link
        run: |
          cat > config.json <<'EOF'
          {
            "group": "cronjob",
            "speedtestMode": "all",
            "pingMethod": "googleping",
            "sortMethod": "rspeed",
            "concurrency": 2,
            "testMode": 2,
            "subscription": "https://raw.githubusercontent.com/freefq/free/master/v2",
            "timeout": 16,
            "language": "en",
            "fontSize": 24,
            "theme": "rainbow",
            "outputMode": 3
          }
          EOF
          ./lite --config config.json --test https://raw.githubusercontent.com/freefq/free/master/v2
          ls -lah

      - name: Upload out.json
        uses: actions/upload-artifact@v4
        with:
          name: out.json
          path: out.json
          if-no-files-found: warn
